name: temp-research-gut-cardiovascular-axis
version: 1.0.0
description: A temporary workflow to research the connection between the gut microbiome and cardiovascular health.
author: Cline
category: Temporary
steps:
  - server: perplexity-mcp-server
    tool: perplexity_search
    description: 'Step 1: Get a high-level overview and identify key review articles on the gut-cardiovascular connection.'
    params:
      query: latest review articles on the gut microbiome's role in cardiovascular health, atherosclerosis, and hypertension
      search_recency_filter: year
  - server: pubmed-mcp-server
    tool: search_pubmed_articles
    description: 'Step 2: Search PubMed for recent, high-impact review articles on the gut-cardiovascular axis.'
    params:
      queryTerm: ("gut microbiome" OR "gastrointestinal microbiome") AND ("cardiovascular disease" OR "atherosclerosis" OR "hypertension" OR "heart failure")
      maxResults: 15
      sortBy: relevance
      filterByPublicationTypes:
        - Review
        - Systematic Review
      fetchBriefSummaries: 10
  - server: pubmed-mcp-server
    tool: fetch_pubmed_content
    description: 'Step 3: Fetch the full abstracts for the top 5 most relevant articles from the PubMed search.'
    params:
      queryKey: '{{steps[1].result.eSearchResult.queryKey}}'
      webEnv: '{{steps[1].result.eSearchResult.webEnv}}'
      retmax: 5
      detailLevel: abstract_plus
temporary: true
created_date: '2025-06-25'
last_updated_date: '2025-06-25'

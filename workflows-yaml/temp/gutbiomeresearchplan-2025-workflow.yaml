name: GutBiomeResearchPlan-2025
version: 1.0.0
description: A structured workflow to guide an AI agent in researching the gut microbiome's systemic effects and generating a comprehensive scientific report.
author: Cline (AI Research Assistant)
category: Temporary
tags:
  - research
  - gut-biome
  - pubmed
  - perplexity
steps:
  - server: perplexity-mcp-server
    tool: perplexity_search
    description: 'Step 1: Conduct a broad, state-of-the-art search to gather foundational knowledge and identify key research themes.'
    params:
      query: Latest comprehensive research (2023-2025) on the gut microbiome's influence on systemic health, focusing on the gut-brain axis, the immune system, and metabolic diseases.
      return_related_questions: true
  - server: agent-internal
    tool: analyze_and_plan_searches
    description: 'Step 2: Analyze initial findings to structure the deep-dive research phase by identifying major themes and preparing targeted search queries.'
    params:
      input: Result from Step 1
      task: From the initial search, identify 3-5 primary themes of influence (e.g., 'Gut-Brain Axis', 'Immunomodulation', 'Metabolic Regulation'). For each theme, formulate a specific, effective query string for a PubMed search.
  - server: pubmed-mcp-server
    tool: search_pubmed_articles
    description: 'Step 3a: Execute a targeted PubMed search for the first major theme to find relevant scientific literature.'
    params:
      queryTerm: Dynamic query for Theme 1 from Step 2
      maxResults: 15
      sortBy: relevance
      dateRange:
        minDate: 2023/01/01
      fetchBriefSummaries: 10
  - server: pubmed-mcp-server
    tool: search_pubmed_articles
    description: 'Step 3b: Execute a targeted PubMed search for the second major theme.'
    params:
      queryTerm: Dynamic query for Theme 2 from Step 2
      maxResults: 15
      sortBy: relevance
      dateRange:
        minDate: 2023/01/01
      fetchBriefSummaries: 10
  - server: pubmed-mcp-server
    tool: search_pubmed_articles
    description: 'Step 3c: Execute a targeted PubMed search for the third major theme.'
    params:
      queryTerm: Dynamic query for Theme 3 from Step 2
      maxResults: 15
      sortBy: relevance
      dateRange:
        minDate: 2023/01/01
      fetchBriefSummaries: 10
  - server: agent-internal
    tool: synthesize_and_write_report
    description: 'Step 4: Synthesize all gathered information into a coherent, structured scientific report in Markdown format. The agent will write the full report based on the provided structure and data, citing sources where appropriate.'
    params:
      inputs: Results from all previous steps
      report_structure:
        title: 'The Systemic Influence of the Gut Microbiome: A 2025 Research Synthesis'
        sections:
          - Introduction
          - 'The Gut-Brain Axis: A New Frontier in Neuroscience'
          - Microbiome-Mediated Immunomodulation
          - The Role of the Gut Microbiota in Metabolic Health
          - Conclusion and Future Research Directions
temporary: true
created_date: '2025-06-25'
last_updated_date: '2025-06-25'

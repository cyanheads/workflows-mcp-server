name: Gut-Immune Axis Research Workflow
version: 1.0.0
description: A workflow to research the gut-immune axis, focusing on how the microbiome modulates immune responses.
author: Cline
category: Temporary
tags:
  - research
  - gut-biome
  - immunology
steps:
  - server: perplexity-mcp-server
    tool: perplexity_search
    description: Find recent review articles on the gut-immune axis.
    params:
      query: recent scientific reviews on the gut microbiome's role in immune system development and regulation
      search_recency_filter: year
  - server: pubmed-mcp-server
    tool: search_pubmed_articles
    description: Search PubMed for key literature on immune modulation by gut microbes.
    params:
      queryTerm: gut microbiome immune system regulation autoimmune
      maxResults: 10
      sortBy: relevance
      filterByPublicationTypes:
        - Review
      fetchBriefSummaries: 5
  - server: perplexity-mcp-server
    tool: perplexity_search
    description: Summarize the mechanisms of the gut-immune connection and its link to disease.
    params:
      query: Synthesize the latest findings on how the gut microbiome influences both innate and adaptive immunity, and its implications for autoimmune diseases.
      showThinking: true
temporary: true
created_date: '2025-06-25'
last_updated_date: '2025-06-25'

name: temp-research-gut-metabolism-axis
version: 1.0.0
description: A temporary workflow to research the connection between the gut biome and metabolic health (obesity, diabetes, etc.).
author: Cline-Agent
category: Temporary
tags:
  - research
  - pubmed
  - perplexity
  - gut-metabolism-axis
steps:
  - server: pubmed-mcp-server
    tool: search_pubmed_articles
    description: Search for recent, high-impact review articles on the gut-metabolism axis.
    params:
      queryTerm: ("gut microbiota" AND ("metabolism" OR "obesity" OR "type 2 diabetes" OR "metabolic syndrome"))
      maxResults: 10
      sortBy: relevance
      filterByPublicationTypes:
        - Review
        - Systematic Review
      fetchBriefSummaries: 5
  - server: perplexity-mcp-server
    tool: perplexity_search
    description: Perform a broad search to understand the mechanisms by which gut bacteria influence metabolic health.
    params:
      query: mechanisms of gut microbiome influence on obesity and type 2 diabetes
      return_related_questions: true
  - server: agent-native
    tool: synthesize_and_report
    description: Analyze the search results, identify the top 3-5 most relevant papers, fetch their full abstracts, and synthesize a summary of the key findings, mechanisms, and future research directions. Include all sources.
    params: {}
temporary: true
created_date: '2025-06-25'
last_updated_date: '2025-06-25'

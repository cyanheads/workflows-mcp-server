name: GutBiomeResearchWorkflow
version: 1.0.0
description: A temporary workflow to research the gut biome and its systemic effects, focusing on connections to various bodily systems.
author: AI Assistant
category: Temporary
steps:
  - server: pubmed-mcp-server
    tool: search_pubmed_articles
    action: search_pubmed_articles
    description: Search PubMed for articles on the gut biome and its systemic effects.
    params:
      queryTerm: gut biome systemic effects brain skin immune heart liver latest research
      maxResults: 50
      sortBy: pub_date
      dateRange:
        minDate: 2020/01/01
        dateType: pdat
  - server: pubmed-mcp-server
    tool: fetch_pubmed_content
    action: fetch_pubmed_content
    description: Fetch detailed content for the retrieved PMIDs.
    params:
      pmids: '{{step_1.pmids}}'
      detailLevel: abstract_plus
temporary: true
created_date: '2025-06-25'
last_updated_date: '2025-06-25'

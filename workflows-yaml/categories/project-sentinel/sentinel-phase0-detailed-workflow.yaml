name: Sentinel-Phase0-Detailed
version: 1.0.0
description: Establishes the foundational infrastructure for Project Sentinel by initializing the Atlas canvas, defining core entity seed nodes (e.g., Huawei, Nvidia, key suppliers, government bodies), and codifying their primary, known relationships. This workflow ensures a clean, robust, and scalable knowledge graph foundation for subsequent intelligence-gathering phases.
author: NVIDIA Government Affairs - Strategic Intelligence
tags:
  - Initialization
  - Atlas
  - Scaffolding
  - Graph-Setup
steps:
  - server: atlas-mcp-server
    tool: atlas_create_canvas
    action: Initialize Project Sentinel Canvas
    description: Creates a dedicated, versioned Atlas canvas to serve as the central repository for the Huawei ecosystem knowledge graph. This ensures a clean and isolated environment for the project. The canvas ID generated by this step must be captured and used in all subsequent steps.
    params:
      name: Project-Sentinel-Huawei-Ecosystem-v2
      description: A comprehensive, multi-layered intelligence map of Huawei's global ecosystem, including procurement, supply chain, technology, and influence networks. Version 2.3, initiated on 2025-07-21.
  - server: atlas-mcp-server
    tool: atlas_create_nodes
    action: Create Foundational Entity Nodes
    description: Populates the graph with the core entities that form the initial scaffolding of the intelligence map. These include the primary target (Huawei), key subsidiaries (HiSilicon), strategic suppliers (SMIC, TSMC, ASML), relevant government bodies (US BIS, China MIIT), and Nvidia itself for contextual reference. A 'custom_id' field is used to uniquely identify these seed nodes for reliable retrieval in subsequent steps.
    params:
      canvasId: '[Canvas ID from previous step]'
      nodes:
        - nodeType: Company
          content:
            custom_id: huawei
            name: Huawei
            legal_name: Huawei Technologies Co., Ltd.
            country: CHN
            entity_type: Target
        - nodeType: Company
          content:
            custom_id: hisilicon
            name: HiSilicon
            legal_name: Shanghai HiSilicon Technology Co., Ltd.
            country: CHN
            entity_type: Target
        - nodeType: Company
          content:
            custom_id: nvidia
            name: Nvidia
            legal_name: NVIDIA Corporation
            country: USA
            entity_type: Self
        - nodeType: Company
          content:
            custom_id: smic
            name: SMIC
            legal_name: Semiconductor Manufacturing International Corporation
            country: CHN
            entity_type: Supplier
        - nodeType: Company
          content:
            custom_id: tsmc
            name: TSMC
            legal_name: Taiwan Semiconductor Manufacturing Company, Limited
            country: TWN
            entity_type: Supplier
        - nodeType: Company
          content:
            custom_id: asml
            name: ASML
            legal_name: ASML Holding N.V.
            country: NLD
            entity_type: Supplier
        - nodeType: GovernmentBody
          content:
            custom_id: us_bis
            name: US BIS
            country: USA
            level: National
            branch: Economic
        - nodeType: GovernmentBody
          content:
            custom_id: cn_miit
            name: China MIIT
            country: CHN
            level: National
            branch: Economic
  - server: atlas-mcp-server
    tool: atlas_create_edges
    action: Codify Initial Known Relationships
    description: Establishes the foundational, undisputed relationships between the seed nodes. This step connects HiSilicon to Huawei as a subsidiary. The execution of this step requires querying the canvas to resolve the 'custom_id' values ('hisilicon', 'huawei') to their system-generated nodeIds created in the previous step before this tool can be successfully called.
    params:
      canvasId: '[Canvas ID from first step]'
      edges:
        - sourceNodeId: '[Resolved Node ID for custom_id: hisilicon]'
          targetNodeId: '[Resolved Node ID for custom_id: huawei]'
          edgeType: SUBSIDIARY_OF
          content: {}
created_date: '2025-07-21'
last_updated_date: '2025-07-21'
category: Project Sentinel
